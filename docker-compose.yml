services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental
      POSTGRES_DB: rental_db
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

  rental-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.rental
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rental_db
      SPRING_DATASOURCE_USERNAME: rental
      SPRING_DATASOURCE_PASSWORD: rental
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RENTAL_FLEET_SERVICE_URL: http://fleet-service:8082
      RENTAL_CUSTOMER_SERVICE_URL: http://customer-service:8083
    depends_on:
      - postgres
      - kafka
      - fleet-service
      - customer-service

  fleet-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.fleet
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/fleet_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mongo
      - kafka

  customer-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.customer
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/customer_db
      SPRING_DATASOURCE_USERNAME: rental
      SPRING_DATASOURCE_PASSWORD: rental
    depends_on:
      - postgres

  billing-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.billing
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/billing_db
      SPRING_DATASOURCE_USERNAME: rental
      SPRING_DATASOURCE_PASSWORD: rental
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - rental-service
      - fleet-service
      - customer-service
      - billing-service
