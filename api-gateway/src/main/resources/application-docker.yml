spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: rental-service
              uri: http://rental-service:8081
              predicates:
                - Path=/api/v1/reservations/**, /api/v1/rentals/**
            - id: fleet-service
              uri: http://fleet-service:8082
              predicates:
                - Path=/api/v1/vehicles/**
            - id: customer-service
              uri: http://customer-service:8083
              predicates:
                - Path=/api/v1/customers/**
            - id: billing-service
              uri: http://billing-service:8084
              predicates:
                - Path=/api/v1/invoices/**, /api/v1/payments/**
